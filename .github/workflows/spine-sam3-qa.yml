name: Spine SAM3 QA

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

jobs:
  spine-sam3-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GENERATOR_ACCESS_TOKEN: ${{ secrets.GENERATOR_ACCESS_TOKEN }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      SPINE_SAM3_QA_DIR: .qa/spine-sam3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Wrangler
        run: npm install -g wrangler@4.93.0

      - name: Pull latest baseline
        run: node scripts/sync-spine-sam3-qa-r2.mjs pull-baseline --output-dir "$SPINE_SAM3_QA_DIR" --remote --optional

      - name: Gate against baseline
        if: hashFiles('.qa/spine-sam3/history/r2-latest-ok.json') != ''
        run: node scripts/run-spine-sam3-qa.mjs --mode gate --output-dir "$SPINE_SAM3_QA_DIR" --baseline-report "$SPINE_SAM3_QA_DIR/history/r2-latest-ok.json" --skip-zip --no-html --write-history

      - name: Seed baseline
        if: hashFiles('.qa/spine-sam3/history/r2-latest-ok.json') == ''
        run: node scripts/run-spine-sam3-qa.mjs --mode history --output-dir "$SPINE_SAM3_QA_DIR" --no-html

      - name: Push QA artifacts to R2
        if: success()
        run: node scripts/sync-spine-sam3-qa-r2.mjs push --output-dir "$SPINE_SAM3_QA_DIR" --remote

      - name: Upload QA artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spine-sam3-qa
          path: .qa/spine-sam3
          if-no-files-found: ignore
