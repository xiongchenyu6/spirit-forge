<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>灵机阁 · 万象造物展</title>
<style>
  :root { --ink:#0b0d11; --plate:#15181f; --gold:#d4af6a; --gold2:#f0d8a0; --jade:#6fb6a8; --line:rgba(212,175,106,.16); --paper:#e8e3d6; --dim:#9aa0ab; }
  * { box-sizing:border-box; }
  body { margin:0; background:radial-gradient(120% 80% at 50% -10%, #1a1d26 0%, var(--ink) 60%); color:var(--paper); font-family:"Noto Sans SC",system-ui,sans-serif; padding:40px 28px 64px; }
  header { max-width:1200px; margin:0 auto 32px; }
  .brand { color:var(--gold); font-weight:800; letter-spacing:.05em; font-size:13px; }
  h1 { font-size:30px; font-weight:800; margin:6px 0 6px; background:linear-gradient(90deg,var(--gold2),var(--gold)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .lead { color:var(--dim); font-size:14px; line-height:1.7; max-width:760px; }
  .meta-row { margin-top:14px; display:flex; flex-wrap:wrap; gap:8px; }
  .chip { font-size:11px; color:var(--gold); border:1px solid var(--line); border-radius:99px; padding:3px 11px; }
  .grid { max-width:1200px; margin:0 auto; display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:20px; }
  .card { background:var(--plate); border:1px solid var(--line); border-radius:14px; overflow:hidden; cursor:pointer; transition:transform .18s ease, border-color .18s ease; }
  .card:hover { transform:translateY(-3px); border-color:rgba(212,175,106,.4); }
  .thumb { position:relative; }
  .card img { width:100%; aspect-ratio:1; object-fit:cover; display:block; background:#0a0b0e; }
  .anim-badge { position:absolute; top:10px; left:10px; z-index:1; padding:3px 9px; border-radius:999px;
    font-size:11px; letter-spacing:.04em; color:#0a0b0e; font-weight:600;
    background:linear-gradient(135deg,#e8c97a,#d4af6a); border:1px solid rgba(255,255,255,.25);
    box-shadow:0 2px 8px rgba(0,0,0,.4); }
  .anim-badge::before { content:"▶ "; font-size:9px; }
  .anim-badge.rig { background:linear-gradient(135deg,#8fe0cf,#4aceB2); }
  .anim-badge.rig::before { content:"⛓ "; }
  .view-hint { position:absolute; right:10px; bottom:10px; z-index:1; font-size:11px; color:var(--paper); background:rgba(7,9,11,.66); border:1px solid rgba(255,255,255,.1); border-radius:99px; padding:3px 10px; opacity:0; transition:opacity .15s; }
  .card:hover .view-hint { opacity:1; }
  .meta { padding:12px 14px 14px; }
  .type { font-size:11px; color:var(--jade); letter-spacing:.1em; text-transform:uppercase; }
  .brief { font-size:13px; color:#c7cad1; margin:5px 0 0; line-height:1.55; }
  footer { max-width:1200px; margin:40px auto 0; color:var(--dim); font-size:12px; border-top:1px solid var(--line); padding-top:16px; }
  .topbar { max-width:1200px; margin:0 auto 18px; display:flex; gap:18px; }
  .back { color:var(--jade); font-size:13px; text-decoration:none; opacity:.85; transition:opacity .15s; }
  .back:hover { opacity:1; }

  /* 详情弹窗:提示词 + 每一帧 + 循环动画 */
  .overlay { position:fixed; inset:0; z-index:50; background:rgba(5,7,10,.82); backdrop-filter:blur(4px); display:none; align-items:center; justify-content:center; padding:32px 20px; }
  .overlay.open { display:flex; }
  .modal { width:min(960px,100%); max-height:90vh; overflow:auto; background:var(--plate); border:1px solid rgba(212,175,106,.3); border-radius:18px; box-shadow:0 24px 60px rgba(0,0,0,.6); }
  .modal-head { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; padding:20px 24px 0; }
  .modal-title { font-size:20px; font-weight:800; margin:2px 0 4px; }
  .modal-genre { font-size:11px; color:var(--jade); letter-spacing:.1em; text-transform:uppercase; }
  .modal-close { flex:none; width:34px; height:34px; border-radius:9px; border:1px solid var(--line); background:transparent; color:var(--paper); font-size:18px; cursor:pointer; line-height:1; }
  .modal-close:hover { border-color:var(--gold); }
  .modal-body { display:grid; grid-template-columns:1.1fr .9fr; gap:24px; padding:18px 24px 26px; }
  @media (max-width:720px){ .modal-body { grid-template-columns:1fr; } }
  .stage { position:relative; aspect-ratio:1; border-radius:12px; overflow:hidden; cursor:pointer;
    background:linear-gradient(45deg, rgba(255,255,255,.045) 25%, transparent 25%), linear-gradient(-45deg, rgba(255,255,255,.045) 25%, transparent 25%), rgba(2,6,10,.86);
    background-size:18px 18px; background-position:0 0,0 9px; display:grid; place-items:center; border:1px solid rgba(111,182,168,.28); }
  .stage img { width:88%; height:88%; object-fit:contain; filter:drop-shadow(0 10px 18px rgba(0,0,0,.5)); }
  .stage-tag { position:absolute; right:12px; bottom:12px; font-size:11px; color:var(--paper); background:rgba(7,9,11,.66); border:1px solid rgba(255,255,255,.1); border-radius:99px; padding:3px 11px; display:inline-flex; gap:6px; align-items:center; }
  .frames { display:flex; gap:8px; margin-top:12px; flex-wrap:wrap; }
  .frame { position:relative; width:64px; height:64px; border-radius:9px; overflow:hidden; cursor:pointer; padding:0; border:1px solid var(--line);
    background:linear-gradient(45deg, rgba(255,255,255,.05) 25%, transparent 25%), linear-gradient(-45deg, rgba(255,255,255,.05) 25%, transparent 25%), rgba(2,6,10,.82);
    background-size:12px 12px; background-position:0 0,0 6px; }
  .frame.sel { border-color:var(--gold); box-shadow:0 0 0 1px var(--gold); }
  .frame img { width:100%; height:100%; object-fit:contain; }
  .frame span { position:absolute; left:3px; bottom:2px; font-size:8px; color:var(--paper); background:rgba(7,9,11,.7); border-radius:4px; padding:0 3px; }
  .side h3 { font-size:12px; color:var(--gold); letter-spacing:.08em; margin:0 0 8px; }
  .prompt { font-size:13px; line-height:1.7; color:#d8dbe2; background:rgba(2,6,10,.5); border:1px solid var(--line); border-radius:10px; padding:12px 14px; white-space:pre-wrap; }
  .side .actions { display:flex; gap:10px; margin-top:14px; flex-wrap:wrap; }
  .btn { font-size:13px; border-radius:9px; padding:8px 14px; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:6px; border:1px solid var(--line); background:transparent; color:var(--paper); }
  .btn.gold { background:linear-gradient(135deg,#e8c97a,#d4af6a); color:#0a0b0e; font-weight:600; border-color:transparent; }
  .btn:hover { border-color:var(--gold); }
  .side .note { font-size:12px; color:var(--dim); line-height:1.6; margin-top:14px; }
</style>
</head>
<body>
  <header>
    <div class="topbar"><a class="back" href="/landing/">← 返回首页</a><a class="back" href="/generator/">开始生成 →</a></div>
    <div class="brand">灵机阁 LINGJI FORGE</div>
    <h1>万象造物展 · 真实生成样本</h1>
    <p class="lead">以下素材由灵机阁生成台在自有 ComfyUI（RTX 4090 · FLUX-dev）上真实生成，覆盖角色、怪物、武器、道具、特效、UI、地图、图标，从仙侠到赛博朋克的多题材。点开任意一件，可查看提示词、生成的每一帧与循环动画——在前人基础上继续创作。</p>
    <div class="meta-row" id="chips"></div>
  </header>
  <div class="grid" id="grid"></div>
  <footer>单帧为单次文生图真实输出 · 标注「帧动画」者为多帧动作包合成的循环预览 · 点开查看提示词与每一帧 · 可经动作包、SAM3 分层、Spine 绑骨继续生产</footer>

  <div class="overlay" id="overlay">
    <div class="modal" id="modal" role="dialog" aria-modal="true"></div>
  </div>

  <script>
    // file: 卡片封面;type: 题材;brief: 一句话;prompt: 真实生成提示词;
    // frames: 多帧动作序列(单帧素材留空,直接用 file)。
    const ITEMS = [
      { file:"showcase-character-xianxia", type:"角色 · 仙侠", brief:"青衫剑客，御剑而立，鎏金衣纹",
        prompt:"青衫剑客，仙侠风格，御剑而立，鎏金云纹衣袍，长发飘逸，半身立绘，国风工笔，柔和侧光，透明背景，高细节" },
      { file:"showcase-character-cyberpunk", type:"角色 · 赛博朋克", brief:"都市夜行者，霓虹外套，机械义肢",
        prompt:"赛博朋克都市夜行者，黑色长外套，机械义肢，霓虹光晕，雨夜街头，全身立绘，科幻写实，电影级打光" },
      { file:"showcase-character-pixel", type:"角色 · 像素", brief:"银甲红披风骑士，侧身行走",
        prompt:"像素风银甲骑士，红色披风，侧身行走姿态，16-bit 复古像素，干净轮廓，透明背景，可作行走动画帧" },
      { file:"monster-idle", type:"怪物 · 西幻", brief:"幽蓝鬃毛巨狼魔兽，待机·移动·攻击·倒地",
        prompt:"西幻巨狼魔兽，幽蓝鬃毛，獠牙利爪，全身战斗姿态，含待机/移动/攻击/倒地四帧动作，俯视角 RPG，透明背景",
        anim:"showcase-monster-anim.gif",
        frames:[ ["monster-idle","Idle 待机"],["monster-move","Move 移动"],["monster-attack","Attack 攻击"],["monster-death","Death 倒地"] ] },
      { file:"rig-monster-walk", type:"怪物 · Spine 骨骼绑定", brief:"SAM3 分层 → Spine 绑骨 → 关节驱动:待机/行走/攻击",
        prompt:"以单帧怪物为种子,SAM3 按语义分出头/躯干/胯/四肢图层,自动绑定骨骼并推断关节枢轴,再用关节旋转驱动 idle/walk/attack 循环——真正的 2D 骨骼动画,而非逐帧换图。可导出 Spine skeleton.json + atlas 进引擎。",
        cover:"rig-monster-walk.gif",
        clips:[ ["rig-monster-idle","Idle 待机"],["rig-monster-walk","Walk 行走"],["rig-monster-attack","Attack 攻击"],["rig-monster-hurt","Hurt 受击"],["rig-monster-death","Death 倒地"] ] },
      { file:"showcase-creature-drone", type:"怪物 · 科幻", brief:"悬浮侦察无人机，钢蓝装甲",
        prompt:"悬浮侦察无人机，钢蓝装甲，发光传感器阵列，科幻机械，俯视角游戏素材，透明背景" },
      { file:"showcase-weapon-jade-sword", type:"武器 · 仙侠", brief:"玉骨长剑，半透碧玉剑身，鎏金护手",
        prompt:"玉骨长剑，半透碧玉剑身，鎏金云纹护手，仙侠武器道具，柔和高光，居中特写，透明背景" },
      { file:"showcase-prop-spirit-gem", type:"道具", brief:"灵石宝珠，多面切割，内蕴流光",
        prompt:"灵石宝珠，多面切割，内蕴流光，魔幻发光宝石，道具图标，居中特写，透明背景" },
      { file:"skill-vfx-burst", type:"特效", brief:"金色爆发冲击波 · 蓄力·爆发·命中·消散",
        prompt:"金色能量爆发冲击波技能特效，含蓄力/爆发/命中/消散四帧序列，居中，透明背景，可循环播放",
        anim:"showcase-vfx-anim.gif",
        frames:[ ["skill-vfx-charge","蓄力"],["skill-vfx-burst","爆发"],["skill-vfx-impact","命中"],["skill-vfx-fade","消散"] ] },
      { file:"showcase-ui-hud", type:"UI 组件", brief:"现代游戏 HUD 边框，玻璃拟态",
        prompt:"现代游戏 HUD 界面边框，玻璃拟态，科技感发光描边，UI 组件，深色背景" },
      { file:"showcase-map-forest", type:"地图", brief:"俯视森林地表，草地与石径",
        prompt:"俯视角森林地表贴图，草地与石径，可拼接，游戏地图素材，写实风" },
      { file:"showcase-icon-portal", type:"图标", brief:"传送阵法，青金灵光徽记",
        prompt:"传送阵法图标，青金灵光徽记，对称符文，仙侠 UI 图标，发光，透明背景" },
    ];

    const genres = [...new Set(ITEMS.map(i => i.type.split(" · ")[1]).filter(Boolean))];
    document.getElementById("chips").innerHTML =
      [`${ITEMS.length} 件真实输出`, ...genres].map(t => `<span class="chip">${t}</span>`).join("");

    document.getElementById("grid").innerHTML = ITEMS.map((it, idx) => {
      const cover = it.cover || (it.anim ? it.anim : `${it.file}.png`);
      const badge = it.clips ? `<span class="anim-badge rig">Spine 骨骼</span>`
        : it.frames ? `<span class="anim-badge">${it.frames.length} 帧动画</span>` : "";
      return `<div class="card" data-idx="${idx}">
        <div class="thumb">${badge}<span class="view-hint">点开看提示词与每一帧</span><img src="${cover}" alt="${it.type}" loading="lazy" /></div>
        <div class="meta"><div class="type">${it.type}</div><p class="brief">${it.brief}</p></div>
      </div>`;
    }).join("");

    // ---- 详情弹窗 ----
    const overlay = document.getElementById("overlay");
    const modal = document.getElementById("modal");
    let timer = null;

    function clearTimer(){ if (timer){ clearInterval(timer); timer = null; } }

    function openModal(idx){
      const it = ITEMS[idx];
      if (it.clips) { openClipsModal(it); return; }
      const frames = it.frames || [[it.file, it.type.split(" · ")[0]]];
      const multi = frames.length > 1;
      modal.innerHTML = `
        <div class="modal-head">
          <div><div class="modal-genre">${it.type}</div><div class="modal-title">${it.brief}</div></div>
          <button class="modal-close" aria-label="关闭">×</button>
        </div>
        <div class="modal-body">
          <div>
            <div class="stage" id="stage" title="${multi ? '点击恢复循环播放' : ''}">
              <img id="stageImg" src="${frames[0][0]}.png" alt="${frames[0][1]}" />
              ${multi ? `<span class="stage-tag"><span id="playState">▶</span> <span id="stageLabel">${frames[0][1]}</span></span>` : ''}
            </div>
            ${multi ? `<div class="frames" id="frames">${frames.map((fr,i)=>`<button class="frame${i===0?' sel':''}" data-fi="${i}"><img src="${fr[0]}.png" alt="${fr[1]}"/><span>${fr[1].split(" ")[0]}</span></button>`).join("")}</div>` : ''}
          </div>
          <div class="side">
            <h3>提示词 PROMPT</h3>
            <div class="prompt" id="promptText">${it.prompt}</div>
            <div class="actions">
              <button class="btn gold" id="copyBtn">复制提示词</button>
              <a class="btn" href="/generator/">去生成台造物 →</a>
            </div>
            <p class="note">${multi ? `共 ${frames.length} 帧动作序列，大图循环播放;点击任一帧可定格查看。` : '单帧文生图真实输出。'}可在生成台用此提示词复刻，或继续做动作包 / SAM3 分层 / Spine 绑骨。</p>
          </div>
        </div>`;

      overlay.classList.add("open");
      document.body.style.overflow = "hidden";

      modal.querySelector(".modal-close").onclick = closeModal;
      modal.querySelector("#copyBtn").onclick = (e) => {
        navigator.clipboard?.writeText(it.prompt).then(() => { e.target.textContent = "已复制 ✓"; setTimeout(()=>{ e.target.textContent = "复制提示词"; }, 1600); });
      };

      if (multi){
        const stageImg = modal.querySelector("#stageImg");
        const stageLabel = modal.querySelector("#stageLabel");
        const playState = modal.querySelector("#playState");
        const frameBtns = [...modal.querySelectorAll(".frame")];
        let cur = 0, playing = true;
        const show = (i) => {
          cur = i;
          stageImg.src = `${frames[i][0]}.png`;
          stageLabel.textContent = frames[i][1];
          frameBtns.forEach((b,bi)=> b.classList.toggle("sel", bi===i));
        };
        const play = () => { playing = true; playState.textContent = "▶"; clearTimer(); timer = setInterval(()=> show((cur+1)%frames.length), 360); };
        const pause = () => { playing = false; playState.textContent = "⏸"; clearTimer(); };
        modal.querySelector("#stage").onclick = () => playing ? pause() : play();
        frameBtns.forEach((b,i)=> b.onclick = () => { pause(); show(i); });
        play();
      }
    }

    // Spine 骨骼动画弹窗:每个 clip 本身就是循环 GIF(自动播放),大图=当前 clip,
    // 缩略图切换 clip;无需 flipbook 定时器。
    function openClipsModal(it){
      const clips = it.clips;
      modal.innerHTML = `
        <div class="modal-head">
          <div><div class="modal-genre">${it.type}</div><div class="modal-title">${it.brief}</div></div>
          <button class="modal-close" aria-label="关闭">×</button>
        </div>
        <div class="modal-body">
          <div>
            <div class="stage"><img id="clipImg" src="${clips[1] ? clips[1][0] : clips[0][0]}.gif" alt="rig" />
              <span class="stage-tag">▶ <span id="clipLabel">${(clips[1]||clips[0])[1]}</span></span></div>
            <div class="frames" id="clipRow">${clips.map((c,i)=>`<button class="frame${i===1?' sel':''}" data-ci="${i}"><img src="${c[0]}.gif" alt="${c[1]}"/><span>${c[1].split(" ")[0]}</span></button>`).join("")}</div>
          </div>
          <div class="side">
            <h3>提示词 / 流程</h3>
            <div class="prompt">${it.prompt}</div>
            <div class="actions">
              <button class="btn gold" id="copyBtn">复制说明</button>
              <a class="btn" href="/generator/">去生成台造物 →</a>
            </div>
            <p class="note">每个动作都是 Spine 骨骼关节驱动的循环动画(非逐帧换图)。可在素材库对任意动作包做 SAM3 分层 + 绑骨,导出 skeleton.json 进引擎二次编辑。</p>
          </div>
        </div>`;
      overlay.classList.add("open");
      document.body.style.overflow = "hidden";
      modal.querySelector(".modal-close").onclick = closeModal;
      modal.querySelector("#copyBtn").onclick = (e) => { navigator.clipboard?.writeText(it.prompt).then(()=>{ e.target.textContent="已复制 ✓"; setTimeout(()=>{e.target.textContent="复制说明";},1600); }); };
      const clipImg = modal.querySelector("#clipImg"), clipLabel = modal.querySelector("#clipLabel");
      const btns = [...modal.querySelectorAll("#clipRow .frame")];
      btns.forEach((b,i)=> b.onclick = () => { clipImg.src = `${clips[i][0]}.gif`; clipLabel.textContent = clips[i][1]; btns.forEach((x,xi)=>x.classList.toggle("sel",xi===i)); });
    }

    function closeModal(){ clearTimer(); overlay.classList.remove("open"); document.body.style.overflow = ""; }

    document.getElementById("grid").addEventListener("click", (e) => {
      const card = e.target.closest(".card");
      if (card) openModal(Number(card.dataset.idx));
    });
    overlay.addEventListener("click", (e) => { if (e.target === overlay) closeModal(); });
    document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeModal(); });
  </script>
</body>
</html>
