<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;padding:24px;background:var(--bg-base);display:flex;gap:36px;}
.meta{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);margin-bottom:12px;}
.mono{font-family:var(--font-mono);color:var(--gold-200);font-size:15px;line-height:1.7;}

<body>
<div style="flex:1">
  <div class="meta">var(--font-mono) · 参数 / Metadata</div>

</div>
<div style="flex:1">
  <div class="meta">var(--font-script) · 手写点缀（克制使用）</div>
  <div class="script">灵机阁</div>
</div>
</body></html>
