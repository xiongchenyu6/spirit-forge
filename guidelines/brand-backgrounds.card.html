<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;padding:22px;background:var(--bg-base);font-family:var(--font-sans);display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.tile{height:150px;border-radius:var(--radius-md);border:1px solid var(--border-subtle);position:relative;overflow:hidden;display:flex;align-items:flex-end;}
.lab{font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);padding:8px 10px;position:relative;z-index:2;}
</style></head>
<body>
<div class="tile lf-bg-deep"><span class="lab">.lf-bg-deep<br/>虚空灵光</span></div>
<div class="tile lf-bg-array" style="background:var(--bg-deep)"><span class="lab">.lf-bg-array<br/>阵法星盘</span></div>
<div class="tile lf-bg-mist" style="background:var(--bg-deep)"><span class="lab">.lf-bg-mist<br/>云雾水汽</span></div>
</body></html>
