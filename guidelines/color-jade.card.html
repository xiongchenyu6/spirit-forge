<!-- @dsCard group="Colors" viewport="700x180" name="玄青 Jade — 品牌青" subtitle="Secondary brand color, success, jade washes" -->
<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:22px;background:var(--bg-base);font-family:var(--font-sans);}
  .row{display:flex;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-subtle);}
  .sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;}
  .n{font-family:var(--font-mono);font-size:11px;font-weight:600;}
  .v{font-family:var(--font-mono);font-size:10px;opacity:.6;}
  .cap{margin:0 0 12px;font-size:12px;letter-spacing:var(--tracking-wide);color:var(--text-secondary);}
</style></head>
<body>
<p class="cap">玄青 — 品牌副色，象征灵气与玉石。用于次级操作、成功态、青色光晕。</p>
<div class="row">
  <div class="sw" style="background:var(--jade-200);color:#0E211F"><span class="n">jade-200</span><span class="v">#A6CFC6</span></div>
  <div class="sw" style="background:var(--jade-300);color:#0E211F"><span class="n">jade-300</span><span class="v">#74B0A4</span></div>
  <div class="sw" style="background:var(--jade-400);color:#0E211F"><span class="n">jade-400</span><span class="v">#4A8E82</span></div>
  <div class="sw" style="background:var(--jade-500);color:#F4F1E8"><span class="n">jade-500 ·核</span><span class="v">#2F6E64</span></div>
  <div class="sw" style="background:var(--jade-700);color:#F4F1E8"><span class="n">jade-700</span><span class="v">#1E4A44</span></div>
  <div class="sw" style="background:var(--jade-900);color:#A6CFC6"><span class="n">jade-900</span><span class="v">#143330</span></div>
</div>
</body></html>
