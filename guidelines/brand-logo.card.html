<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;background:var(--bg-deep);}
.wrap{display:flex;align-items:center;gap:34px;padding:32px 40px;}
.mark{width:140px;height:140px;flex:none;}
.mark img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 0 24px rgba(201,163,91,.25));}
.name{font-family:var(--font-serif);font-weight:900;font-size:52px;color:var(--text-primary);letter-spacing:.04em;margin:0;line-height:1;}
.en{font-family:var(--font-sans);font-size:14px;letter-spacing:var(--tracking-widest);color:var(--gold-300);text-transform:uppercase;margin:14px 0 0;}
.tag{font-family:var(--font-sans);font-size:13px;color:var(--text-secondary);margin:8px 0 0;}
</style></head>
<body>
<div class="wrap">
  <div class="mark"><img src="../assets/logo-emblem-transparent.png" alt="灵机阁" /></div>
  <div>
    <p class="name">灵机阁</p>
    <p class="en">Lingji Forge</p>
    <p class="tag">面向中国创作者的 AI 游戏素材生成平台</p>
  </div>
</div>
</body></html>
