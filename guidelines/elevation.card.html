<!-- @dsCard group="Spacing" viewport="700x200" name="Elevation — 阴影与灵光" subtitle="Shadows cast into ink + emissive glows" -->
<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;padding:28px 24px;background:var(--bg-base);font-family:var(--font-sans);display:flex;gap:22px;flex-wrap:wrap;align-items:center;}
.box{width:120px;height:80px;background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;}
.t{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);text-align:center;}
</style></head>
<body>
<div class="box" style="box-shadow:var(--shadow-card)"><span class="t">shadow<br/>card</span></div>
<div class="box" style="box-shadow:var(--shadow-panel)"><span class="t">shadow<br/>panel</span></div>
<div class="box" style="box-shadow:var(--shadow-card),var(--glow-gold)"><span class="t" style="color:var(--gold-300)">glow<br/>gold</span></div>
<div class="box" style="box-shadow:var(--shadow-card),var(--glow-jade)"><span class="t" style="color:var(--jade-300)">glow<br/>jade</span></div>
<div class="box" style="box-shadow:var(--shadow-card),var(--glow-spirit)"><span class="t" style="color:var(--gold-200)">灵石<br/>spirit</span></div>
</body></html>
