<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;padding:22px 24px;background:var(--bg-base);font-family:var(--font-sans);}
.r{display:flex;align-items:baseline;gap:16px;padding:5px 0;border-bottom:1px solid var(--divider);}
.t{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);width:120px;flex:none;}
.s{color:var(--text-primary);font-family:var(--font-serif);white-space:nowrap;}
</style></head>
<body>
<div class="r"><span class="t">6xl · 84 · black</span><span class="s" style="font-size:48px;font-weight:900">万象生成</span></div>
<div class="r"><span class="t">4xl · 48 · bold</span><span class="s" style="font-size:34px;font-weight:700">炼器造物</span></div>
<div class="r"><span class="t">2xl · 28 · semibold</span><span class="s" style="font-size:26px;font-weight:600">创作台</span></div>
<div class="r"><span class="t">xl · 22</span><span class="s" style="font-size:22px">素材标题</span></div>
<div class="r"><span class="t">md · 16 · sans</span><span class="s" style="font-size:16px;font-family:var(--font-sans)">正文内容</span></div>
<div class="r"><span class="t">sm · 13 · sans</span><span class="s" style="font-size:13px;font-family:var(--font-sans);color:var(--text-secondary)">辅助说明</span></div>
</body></html>
