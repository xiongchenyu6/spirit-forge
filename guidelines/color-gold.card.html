<!-- @dsCard group="Colors" viewport="700x180" name="鎏金 Gold — 主色阶" subtitle="Primary action, 灵石, emissive accents" -->
<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:22px;background:var(--bg-base);font-family:var(--font-sans);}
  .row{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-subtle);}
  .sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;}
  .n{font-family:var(--font-mono);font-size:11px;color:rgba(0,0,0,.55);font-weight:600;}
  .v{font-family:var(--font-mono);font-size:10px;color:rgba(0,0,0,.4);}
  .cap{margin:0 0 12px;font-size:12px;letter-spacing:var(--tracking-wide);color:var(--text-secondary);}
</style></head>
<body>
<p class="cap">鎏金 — 主要操作、灵石、发光强调。深色界面中的"灵光"来源。</p>
<div class="row">
  <div class="sw" style="background:var(--gold-200)"><span class="n">gold-200</span><span class="v">#F2E5C7</span></div>
  <div class="sw" style="background:var(--gold-300)"><span class="n">gold-300</span><span class="v">#E8D3A1</span></div>
  <div class="sw" style="background:var(--gold-400)"><span class="n">gold-400</span><span class="v">#DAB978</span></div>
  <div class="sw" style="background:var(--gold-500)"><span class="n">gold-500 ·核</span><span class="v">#C9A35B</span></div>
  <div class="sw" style="background:var(--gold-600)"><span class="n">gold-600</span><span class="v">#B68E45</span></div>
  <div class="sw" style="background:var(--gold-700)"><span class="n">gold-700</span><span class="v">#9C7A36</span></div>
  <div class="sw" style="background:var(--gold-800)"><span class="n">gold-800</span><span class="v">#7E6128</span></div>
</div>
</body></html>
