<!-- @dsCard group="Brand" viewport="700x200" name="五色 — 品牌色彩哲学" subtitle="墨黑 · 玄青 · 鎏金 · 月光蓝 · 朱砂 + 玉白" -->
<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;padding:24px;background:var(--bg-base);font-family:var(--font-sans);}
.row{display:flex;gap:14px;}
.c{flex:1;text-align:center;}
.dot{width:100%;height:64px;border-radius:var(--radius-md);border:1px solid var(--border-subtle);margin-bottom:10px;}
.cn{font-family:var(--font-serif);font-size:17px;color:var(--text-primary);font-weight:600;}
.role{font-size:11px;color:var(--text-muted);margin-top:3px;}
</style></head>
<body>
<div class="row">
  <div class="c"><div class="dot" style="background:var(--ink-900)"></div><div class="cn">墨黑</div><div class="role">虚空 · 底</div></div>
  <div class="c"><div class="dot" style="background:var(--jade-500)"></div><div class="cn">玄青</div><div class="role">灵气 · 品牌</div></div>
  <div class="c"><div class="dot" style="background:var(--gold-500)"></div><div class="cn">鎏金</div><div class="role">造物 · 灵石</div></div>
  <div class="c"><div class="dot" style="background:var(--moon-400)"></div><div class="cn">月光蓝</div><div class="role">信息 · 冷光</div></div>
  <div class="c"><div class="dot" style="background:var(--cinnabar-500)"></div><div class="cn">朱砂</div><div class="role">点缀 · 警示</div></div>
  <div class="c"><div class="dot" style="background:var(--jade-white)"></div><div class="cn" style="color:var(--text-primary)">玉白</div><div class="role">文字 · 玉简</div></div>
</div>
</body></html>
