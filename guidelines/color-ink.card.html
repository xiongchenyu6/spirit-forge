<!-- @dsCard group="Colors" viewport="700x180" name="墨黑 Ink — 表面层级" subtitle="App surfaces from void to raised control" -->
<!DOCTYPE html>
<html lang="zh"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:22px;background:var(--bg-base);font-family:var(--font-sans);}
  .row{display:flex;border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-subtle);}
  .sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#A6B0B4;}
  .n{font-family:var(--font-mono);font-size:11px;font-weight:600;}
  .v{font-family:var(--font-mono);font-size:10px;opacity:.6;}
  .cap{margin:0 0 12px;font-size:12px;letter-spacing:var(--tracking-wide);color:var(--text-secondary);}
</style></head>
<body>
<p class="cap">墨黑 — 界面的"虚空"。从最深的背景到抬升控件，层级靠明度区分。</p>
<div class="row">
  <div class="sw" style="background:var(--ink-950)"><span class="n">ink-950</span><span class="v">#07090B</span></div>
  <div class="sw" style="background:var(--ink-900)"><span class="n">ink-900 ·底</span><span class="v">#0B0F12</span></div>
  <div class="sw" style="background:var(--ink-800)"><span class="n">ink-800</span><span class="v">#131B20</span></div>
  <div class="sw" style="background:var(--ink-700)"><span class="n">ink-700 ·卡</span><span class="v">#19242A</span></div>
  <div class="sw" style="background:var(--ink-600)"><span class="n">ink-600</span><span class="v">#212F35</span></div>
  <div class="sw" style="background:var(--ink-500)"><span class="n">ink-500</span><span class="v">#2B3B42</span></div>
</div>
</body></html>
