<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>灵机阁 · 我的素材库</title>
    <link rel="stylesheet" href="../../styles.css" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
  </head>
  <body class="lf-bg-deep library-shell">
    <div class="library-app">
      <header class="library-topbar">
        <a class="library-brand" href="/generator/" aria-label="灵机阁">
          <img src="../../assets/logo-emblem-transparent.png" alt="" />
          <span>
            <strong>灵机阁</strong>
            <small>Asset Library</small>
          </span>
        </a>
        <nav class="library-nav" aria-label="页面">
          <a href="/generator/">生成台</a>
          <a href="/library/" aria-current="page">素材库</a>
          <a href="/templates/">模板</a>
        </nav>
        <div class="library-status" id="libraryStatus">
          <span class="pulse-dot"></span>
          <span>连接中</span>
        </div>
      </header>

      <main class="library-main">
        <section class="library-toolbar" aria-label="素材库工具">
          <div>
            <h1>我的素材库</h1>
            <p>生成完成的 2D / 3D 素材会自动归档到 Cloudflare R2。</p>
          </div>
          <div class="library-controls">
            <label class="search-field">
              <i data-lucide="search"></i>
              <input id="searchInput" type="search" placeholder="搜索文件名或 prompt id" />
            </label>
            <div class="filter-tabs" role="tablist" aria-label="素材类型">
              <button class="active" type="button" data-kind="all">全部</button>
              <button type="button" data-kind="pack">整包</button>
              <button type="button" data-kind="2d">2D</button>
              <button type="button" data-kind="3d">3D</button>
            </div>
            <button class="refresh-button" id="refreshBtn" type="button">
              <i data-lucide="refresh-cw"></i>
              <span>刷新</span>
            </button>
          </div>
        </section>

        <section class="library-auth" id="authPanel" hidden>
          <div>
            <strong>需要访问令牌</strong>
            <span>素材库 API 使用和生成器相同的访问令牌。</span>
          </div>
          <div class="auth-token-row">
            <input id="accessToken" type="password" autocomplete="off" placeholder="输入访问令牌" />
            <button id="saveAccessTokenBtn" type="button">保存</button>
          </div>
        </section>

        <section class="library-grid" id="assetGrid" aria-live="polite"></section>
        <aside class="pack-detail-panel" id="packDetailPanel" hidden aria-label="整包详情"></aside>
      </main>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
