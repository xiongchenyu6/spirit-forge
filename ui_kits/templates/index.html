<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>灵机阁 · 万象模板</title>
<link rel="stylesheet" href="../../styles.css" />
<style> body { margin: 0; background: var(--bg-base); } </style>
</head>
<body class="lf-scroll">
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script>window.LF_ICON_BASE = "../../";</script>
<script src="/ui_kits/i18n.js"></script>
<script>window.__lf.setPageTitle("templates.title");</script>
<script type="text/babel">
const { Button, Badge, SpiritStone, Tag, OrnateButton, FeaturePanel } = window.LingjiForgeDesignSystem_e6d384;
const t = window.__lf.raw("templates");
const GENERATED_BASE = "../../assets/generated/official/";
const NAV_HREFS = ["/generator/", "/templates/", "/pricing/", "/landing/"];
function generatedImageSrc(file) {
  return file && file.includes("/") ? file : GENERATED_BASE + file;
}
function GeneratedImage({ file, alt, style = {} }) {
  return (
    <img src={generatedImageSrc(file)} alt={alt} loading="lazy" style={{
      width: "100%",
      height: "100%",
      objectFit: "contain",
      imageRendering: "pixelated",
      filter: "drop-shadow(0 12px 18px rgba(0,0,0,0.4))",
      ...style,
    }} />
  );
}

const TEMPLATE_INPUTS = {
  sword: {
    preset: "character-actions",
    assetType: "character",
    style: "pixel",
    camera: "front",
    brief: "一名适合俯视角 RPG 的东方剑士主角，青绿色披风，玉石剑柄，完整身体居中，像素风，纯色背景；需要 idle、walk、attack、hurt 四帧动作",
  },
  "wand-sparkles": {
    preset: "skill-vfx",
    assetType: "vfx",
    style: "pixel",
    camera: "front",
    brief: "西幻法师技能特效，蓝紫魔法阵、金色粒子和奥术闪电；需要 charge、burst、impact、fade 四帧，居中，纯色背景，无文字",
  },
  skull: {
    preset: "monster-actions",
    assetType: "creature",
    style: "pixel",
    camera: "front",
    brief: "赛博朋克敌人怪物，机械骨架、霓虹能量核心、清楚头部和四肢，像素风，完整身体居中，纯色背景；需要 idle、move、attack、death 四帧动作",
  },
  bot: {
    preset: "sprite",
    assetType: "character",
    style: "realistic",
    camera: "turnaround",
    brief: "科幻机甲角色，清楚正面轮廓、硬表面装甲、发光传感器，单帧完整身体，纯色背景，适合作为 3D 或动作包源图",
  },
  sprout: {
    preset: "sprite",
    assetType: "character",
    style: "anime",
    camera: "front",
    brief: "Q 版农场 NPC，温和村民服装、草帽和小工具，完整身体居中，干净纯色背景，适合后续生成 NPC 动作包",
  },
  map: {
    preset: "map-tiles",
    assetType: "map",
    style: "pixel",
    camera: "top-down",
    brief: "像素地牢 Tileset，俯视地形 tile 表：石路、泥地、水边、墙角、草地、裂缝、地牢边缘和装饰地面；需要可平铺方块",
  },
  "layout-panel-top": {
    preset: "ui-kit",
    assetType: "ui",
    style: "production",
    camera: "front",
    brief: "奇幻游戏 UI 组件套件：生命条、法力条、背包格、按钮、面板、边框角件、分隔线和提示框；每格一个可切图组件，无文字",
  },
  ghost: {
    preset: "skill-vfx",
    assetType: "vfx",
    style: "pixel",
    camera: "front",
    brief: "Boss 巨兽暗黑技能特效，红黑冲击波、爪痕、烟雾和能量爆发；需要 charge、burst、impact、fade 四帧，居中，纯色背景",
  },
  shield: {
    preset: "ui-icons",
    assetType: "icon",
    style: "pixel",
    camera: "front",
    brief: "武侠装备图标表：玉剑、护盾、护符、戒指、药瓶、卷轴、宝石和靴子；4x2 网格，每格一个物品，统一光照，无文字",
  },
};

function generatorHrefForTemplate(tpl) {
  const input = TEMPLATE_INPUTS[tpl[2]] || {
    preset: "sprite",
    assetType: "character",
    style: "pixel",
    camera: "front",
    brief: `${tpl[0]}，${tpl[6]}，完整主体居中，纯色背景，适合游戏素材生产`,
  };
  const params = new URLSearchParams();
  for (const [key, value] of Object.entries(input)) {
    if (value) params.set(key, value);
  }
  return `/generator/?${params.toString()}`;
}

function TplCard({ tpl }) {
  const image = tpl[8];
  const generatorHref = generatorHrefForTemplate(tpl);
  return (
    <div role="link" tabIndex={0} aria-label={`${t.useTemplate} ${tpl[0]}`} onClick={() => { window.location.href = generatorHref; }} onKeyDown={(e) => { if (e.key === "Enter") window.location.href = generatorHref; }} style={{ borderRadius: "var(--radius-lg)", overflow: "hidden", border: "1px solid var(--border-subtle)", background: "var(--surface-card)", cursor: "pointer", transition: "transform var(--dur-base), border-color var(--dur-base), box-shadow var(--dur-base)" }}
      onMouseEnter={(e) => { e.currentTarget.style.transform = "translateY(-4px)"; e.currentTarget.style.borderColor = "var(--border-default)"; e.currentTarget.style.boxShadow = "var(--shadow-panel)"; }}
      onMouseLeave={(e) => { e.currentTarget.style.transform = "none"; e.currentTarget.style.borderColor = "var(--border-subtle)"; e.currentTarget.style.boxShadow = "none"; }}>
      <div style={{ position: "relative", aspectRatio: "16 / 10" }}>
        <div style={{ position: "absolute", inset: 0, background: `radial-gradient(120% 90% at 50% 22%, ${tpl[3]}, ${tpl[4]} 72%)` }} />
        {image ? (
          <>
            <div style={{ position: "absolute", inset: 0, background: "linear-gradient(45deg, rgba(255,255,255,0.045) 25%, transparent 25%), linear-gradient(-45deg, rgba(255,255,255,0.045) 25%, transparent 25%), rgba(2,6,10,0.52)", backgroundSize: "18px 18px", backgroundPosition: "0 0, 0 9px" }} />
            <GeneratedImage file={image} alt={tpl[0]} style={{ position: "absolute", inset: "12px 16px 32px", width: "calc(100% - 32px)", height: "calc(100% - 44px)" }} />
            <span style={{ position: "absolute", top: 10, right: 10, fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--jade-200)", background: "rgba(7,9,11,0.72)", border: "1px solid rgba(90,218,178,0.28)", borderRadius: "var(--radius-sm)", padding: "2px 7px" }}>{t.realOutputLabel}</span>
          </>
        ) : (
          <>
            <div style={{ position: "absolute", inset: 0, background: "repeating-radial-gradient(circle at 50% 32%, transparent 0 24px, rgba(255,255,255,0.03) 24px 25px)", opacity: 0.5 }} />
            <div style={{ position: "absolute", top: "40%", left: "50%", transform: "translate(-50%,-50%)", color: "rgba(255,255,255,0.92)", filter: "drop-shadow(0 0 16px rgba(255,255,255,0.3))" }}><i data-lucide={tpl[2]} style={{ width: 54, height: 54 }} /></div>
          </>
        )}
        {tpl[7] && <span style={{ position: "absolute", top: 10, left: 10 }}><Badge tone="gold" solid>{t.featured}</Badge></span>}
        <span style={{ position: "absolute", bottom: 10, right: 10, fontFamily: "var(--font-mono)", fontSize: 10, color: "rgba(255,255,255,0.8)", background: "rgba(7,9,11,0.6)", borderRadius: 4, padding: "2px 7px" }}>{tpl[5]} {window.__lf.t("templates.assetCountSuffix", { count: tpl[5], symbol: window.__lf.lang === "en" ? "items" : "素材" })}</span>
      </div>
      <div style={{ padding: 15 }}>
        <div style={{ fontFamily: "var(--font-serif)", fontWeight: 600, fontSize: 16, color: "var(--text-primary)" }}>{tpl[0]}</div>
        <div style={{ display: "flex", alignItems: "center", gap: 7, marginTop: 9 }}>
          <Badge tone="jade">{tpl[1]}</Badge>
          <span style={{ fontSize: 11, color: "var(--text-muted)" }}>{tpl[6]}</span>
          <Button variant="outline" size="sm" style={{ marginLeft: "auto" }} onClick={(e) => { e.stopPropagation(); window.location.href = generatorHref; }}>{t.useTemplate}</Button>
        </div>
      </div>
    </div>
  );
}

function Market() {
  const [cat, setCat] = React.useState(t.filters[0]);
  const heroFrames = t.heroFrames || ["monster-idle.png", "monster-move.png", "monster-attack.png", "monster-death.png"];
  React.useEffect(() => { setTimeout(() => window.lucide && window.lucide.createIcons(), 40); });
  return (
    <div>
      <header style={{ height: "var(--topbar-h)", display: "flex", alignItems: "center", gap: 28, padding: "0 40px", borderBottom: "1px solid var(--border-subtle)", background: "rgba(11,15,18,0.8)", backdropFilter: "blur(14px)", position: "sticky", top: 0, zIndex: 50 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <img src="../../assets/logo-emblem-transparent.png" style={{ width: 34, height: 34, objectFit: "contain" }} />
          <span style={{ fontFamily: "var(--font-serif)", fontWeight: 800, fontSize: 21, color: "var(--text-primary)", letterSpacing: "0.04em" }}>{window.__lf.t("app.brand")}</span>
        </div>
        <nav style={{ display: "flex", gap: 4, marginLeft: 12 }}>
          {t.nav.links.map((l, i) => <a key={l} href={NAV_HREFS[i] || "/generator/"} style={{ padding: "8px 14px", fontSize: 14, color: i === 1 ? "var(--gold-200)" : "var(--text-secondary)", textDecoration: "none" }}>{l}</a>)}
        </nav>
        <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 14 }}>
          <SpiritStone count={128} onAdd={() => {}} />
          <Button variant="gold" size="sm" onClick={() => { window.location.href = "/generator/"; }}>{t.nav.start}</Button>
        </div>
      </header>
      <section style={{ maxWidth: 1240, margin: "0 auto", padding: "36px 40px 0" }}>
        {/* featured banner */}
        <div className="lf-bg-deep" style={{ position: "relative", overflow: "hidden", borderRadius: "var(--radius-xl)", border: "1px solid var(--border-default)", padding: "40px 44px", display: "flex", alignItems: "center", gap: 32 }}>
          <img src="../../assets/logo-emblem-transparent.png" style={{ position: "absolute", right: -40, top: -20, width: 320, opacity: 0.08 }} />
          <div style={{ position: "relative", flex: 1 }}>
            <Badge tone="gold">{t.featuredBadge}</Badge>
            <h1 style={{ fontFamily: "var(--font-serif)", fontWeight: 900, fontSize: 40, color: "var(--text-primary)", margin: "14px 0 0" }}>{t.bannerTitle}</h1>
            <p style={{ fontSize: 15, color: "var(--text-secondary)", maxWidth: 460, marginTop: 12, lineHeight: 1.7 }}>{t.bannerDesc}</p>
            <div style={{ display: "flex", gap: 12, marginTop: 22 }}>
              <OrnateButton size="lg" icon={<i data-lucide="layout-template" style={{ width: 17, height: 17 }} />}>{t.labelAll}</OrnateButton>
              <Button variant="ghost" size="lg">{t.unlock}</Button>
            </div>
          </div>
          <FeaturePanel style={{ width: 360, flex: "none" }} bodyStyle={{ justifyContent: "space-between", gap: 10 }}>
            <div style={{ textAlign: "center" }}>
              <div style={{ fontFamily: "var(--font-serif)", fontWeight: 700, fontSize: 19, color: "#eafffb", textShadow: "0 1px 6px rgba(0,0,0,0.6)" }}>{t.heroAssetTitle}</div>
              <div style={{ fontSize: 12, color: "rgba(244,241,232,0.78)", marginTop: 6 }}>{t.heroAssetSub}</div>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 7 }}>
              {heroFrames.map((file, i) => (
                <div key={file} style={{ position: "relative", aspectRatio: "1", borderRadius: "var(--radius-sm)", overflow: "hidden", border: "1px solid rgba(244,241,232,0.16)", background: "rgba(4,8,10,0.72)" }}>
                  <GeneratedImage file={file} alt={`${t.heroAssetTitle} ${i + 1}`} style={{ position: "absolute", inset: 5, width: "calc(100% - 10px)", height: "calc(100% - 10px)" }} />
                </div>
              ))}
            </div>
            <span style={{ alignSelf: "center", fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--jade-200)", background: "rgba(7,9,11,0.62)", border: "1px solid rgba(90,218,178,0.24)", borderRadius: "var(--radius-sm)", padding: "2px 7px" }}>{t.realOutputLabel}</span>
          </FeaturePanel>
        </div>

        <div style={{ display: "flex", gap: 8, margin: "30px 0 22px", flexWrap: "wrap" }}>
          {t.filters.map((c) => <Tag key={c} selected={c === cat} onClick={() => setCat(c)}>{c}</Tag>)}
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 20, paddingBottom: 56 }}>
          {t.templates.map((tpl) => <TplCard key={tpl[0]} tpl={tpl} />)}
        </div>
      </section>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Market />);
</script>
</body>
</html>
