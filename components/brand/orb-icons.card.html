<!-- @dsCard group="Components" viewport="700x460" name="Brand · 仙侠 Orb Icons" subtitle="OrbIcon — 22 painterly 国风 button icons" -->
<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 22px; background: var(--bg-base); }
  .lbl { font-family: var(--font-sans); font-size: 11px; letter-spacing: var(--tracking-wider); color: var(--text-muted); text-transform: uppercase; margin: 0 0 12px; }
  .grid { display: grid; grid-template-columns: repeat(11, 1fr); gap: 6px; margin-bottom: 22px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .cap { font-family: var(--font-mono); font-size: 9px; color: var(--text-faint); }
  .maps { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .map { display: flex; align-items: center; gap: 9px; }
  .mt { font-family: var(--font-sans); font-size: 12px; color: var(--text-secondary); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
window.LF_ICON_BASE = "../../";
const { OrbIcon, ORB_ICONS } = window.LingjiForgeDesignSystem_e6d384;
function Demo() {
  const maps = [["meditation","角色"],["beast","怪物"],["gem","道具"],["portal","技能特效"],["mountain","地图"],["pagoda","建筑"],["starchart","UI 组件"],["talisman","图标"],["crane","动画"],["chest","素材库"]];
  return (
    <div>
      <p className="lbl">全部 22 枚 · OrbIcon</p>
      <div className="grid">
        {ORB_ICONS.map(n => <div className="cell" key={n}><OrbIcon name={n} size={50} /><span className="cap">{n}</span></div>)}
      </div>
      <p className="lbl">产品语义映射 · framed + active</p>
      <div className="maps">
        {maps.map(([n,t]) => <div className="map" key={n}><OrbIcon name={n} size={40} framed active /><span className="mt">{t}</span></div>)}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
