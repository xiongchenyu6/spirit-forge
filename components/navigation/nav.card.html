<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style> body { margin: 0; padding: 24px; background: var(--bg-base); } </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { NavItem } = window.LingjiForgeDesignSystem_e6d384;
const I = (n) => <i data-lucide={n} style={{ width: 17, height: 17 }} />;
function Demo() {
  const [active, setActive] = React.useState("角色");
  const items = [["角色","user"],["怪物 / NPC","ghost"],["道具 / 装备","sword"],["技能特效","sparkles"],["地图 / Tileset","map"],["UI 组件","layout-panel-left"],["图标","shapes"],["我的素材库","folder-open"]];
  return (
    <div style={{ display: "grid", gridTemplateColumns: "240px 240px", gap: 24 }}>
      {[items.slice(0,4), items.slice(4)].map((col, ci) => (
        <div key={ci} style={{ display: "flex", flexDirection: "column", gap: 3 }}>
          {col.map(([label, icon]) => (
            <NavItem key={label} icon={I(icon)} active={label===active} count={label==="怪物 / NPC"?42:null} onClick={()=>setActive(label)}>{label}</NavItem>
          ))}
        </div>
      ))}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>
