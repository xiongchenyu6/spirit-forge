<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--bg-base); }
  .lbl { font-family: var(--font-sans); font-size: 11px; letter-spacing: var(--tracking-wider); color: var(--text-muted); text-transform: uppercase; margin: 0 0 10px; }
  .sec { margin-bottom: 20px; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { PromptInput, Tag, Input, Select, Switch, SegmentedControl } = window.LingjiForgeDesignSystem_e6d384;
const I = (n) => <i data-lucide={n} style={{ width: 15, height: 15 }} />;

function Demo() {
  const [genre, setGenre] = React.useState("仙侠");
  const [alpha, setAlpha] = React.useState(true);
  const [view, setView] = React.useState("8方向");
  const [fmt, setFmt] = React.useState("Sprite Sheet");
  const genres = ["仙侠","武侠","西幻","科幻","赛博朋克","现代","末日","Q版","像素","二次元"];
  return (
    <div>
      <div className="sec">
        <p className="lbl">PromptInput — 创作台核心</p>
        <PromptInput value="生成一个适合俯视角 RPG 的主角，国风像素风，8方向行走动画，透明背景。" onChange={()=>{}} cost={6}
          footer={<><span>国风像素 · 8方向</span><span style={{opacity:.5}}>·</span><span>透明背景</span></>} />
      </div>

      <div className="sec">
        <p className="lbl">Tag — 题材选择（多元，不止仙侠）</p>
        <div className="row">
          {genres.map(g => <Tag key={g} selected={g===genre} onClick={()=>setGenre(g)}>{g}</Tag>)}
        </div>
      </div>

      <div style={{ display: "flex", gap: 24 }}>
        <div style={{ flex: 1 }}>
          <p className="lbl">Input</p>
          <Input placeholder="搜索素材…" icon={I("search")} />
          <div style={{ height: 10 }} />
          <Select defaultValue="unity">
            <option value="wechat">微信小游戏</option>
            <option value="unity">Unity</option>
            <option value="cocos">Cocos Creator</option>
            <option value="godot">Godot</option>
          </Select>
        </div>
        <div style={{ flex: 1 }}>
          <p className="lbl">Switch · SegmentedControl</p>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <Switch checked={alpha} onChange={setAlpha} label="透明背景" />
            <SegmentedControl options={["正面","侧面","俯视角","8方向"]} value={view} onChange={setView} size="sm" />
            <SegmentedControl options={["PNG","GIF","Sprite Sheet"]} value={fmt} onChange={setFmt} size="sm" />
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
setTimeout(() => window.lucide && window.lucide.createIcons(), 60);
</script>
</body>
</html>
